version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fnekdb
    ports:
      - "5432:5432"
  backend:
    build: ./backend
    env_file: .env
    depends_on:
      - db
    ports:
      - "3001:3001"
  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "3000:3000"
